<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tripleS Objekt Formatter</title>
    <style>
        /* New Background Color & Styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1c1c1e; /* Color from your image */
            color: #e2e8f0;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: #ffffff; /* White title */
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .box {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #a1a1aa;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            background-color: #2c2c2e; /* Slightly lighter than background */
            color: #f4f4f5;
            border: 1px solid #3f3f46;
            border-radius: 6px;
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #ffffff; /* White glow when selected */
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        /* --- Updated Button Styles --- */
        .hollow-btn {
            background-color: transparent; /* Hollow background */
            color: white;                   /* White text */
            border: 2px solid white;        /* White border */
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s; /* Smooth transition for hover */
            text-align: center;
        }
        /* Hover effect: Fills the button */
        .hollow-btn:hover {
            background-color: white; /* Fill with white */
            color: #1c1c1e;          /* Text becomes the background color */
        }

        /* Applying the style to all buttons */
        .convert-btn {
            align-self: center;
            width: 200px;
        }
        .action-btn {
            margin-top: 8px;
            align-self: flex-start;
            font-size: 14px; /* Making copy/paste buttons slightly smaller */
            padding: 6px 12px;
        }
    </style>
</head>
<body>

    <h1>tripleS Objekt Formatter</h1>

    <div class="container">
        <!-- Input Box -->
        <div class="box">
            <label for="input">Raw Text:</label>
            <textarea id="input" placeholder="e.g., YooYeon BB111Z (x2) BB119Z BB120A"></textarea>
            <button class="hollow-btn action-btn" onclick="pasteText()">Paste</button>
        </div>

        <button class="hollow-btn convert-btn" onclick="convertText()">Convert</button>

        <!-- Output Box -->
        <div class="box">
            <label for="output">Formatted Text:</label>
            <textarea id="output" readonly placeholder="Output will appear here..."></textarea>
            <button id="copyBtn" class="hollow-btn action-btn" onclick="copyText()">Copy</button>
        </div>
    </div>

    <script>
        const members = [
            "seoyeon", "hyerin", "jiwoo", "chaeyeon", "yooyeon", "soomin", 
            "nakyoung", "yubin", "kaede", "dahyun", "kotone", "yeonji", 
            "nien", "sohyun", "xinyu", "mayu", "lynn", "joobin", 
            "hayeon", "shion", "chaewon", "sullin", "seoah", "jiyeon"
        ];

        // Function to handle pasting text
        async function pasteText() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById("input").value = text;
            } catch (err) {
                alert('Failed to paste text. Your browser might require you to grant clipboard permissions.');
            }
        }

        // Function to handle copying text
        async function copyText() {
            const outputText = document.getElementById("output").value;
            if (!outputText) return;
            
            try {
                await navigator.clipboard.writeText(outputText);
                
                const copyBtn = document.getElementById("copyBtn");
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                
                // Temporarily change style to give feedback
                copyBtn.style.backgroundColor = "white";
                copyBtn.style.color = "#1c1c1e";
                
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.backgroundColor = "transparent"; // Revert to hollow
                    copyBtn.style.color = "white";               // Revert to white text
                }, 2000);
            } catch (err) {
                alert('Failed to copy text.');
            }
        }

        function convertText() {
            const input = document.getElementById("input").value;
            const lines = input.split('\n'); 
            
            const outputLines = lines.map(line => {
                const tokens = line.trim().split(/\s+/);
                
                const processedTokens = tokens.map(token => {
                    if (!token) return "";

                    if (members.includes(token.toLowerCase())) {
                        return token.charAt(0).toUpperCase() + token.slice(1).toLowerCase();
                    }
                    
                    const qtyMatch = token.match(/^\((x\d+)\)$/i);
                    if (qtyMatch) {
                        return qtyMatch[1].toLowerCase();
                    }
                    
                    const objektMatch = token.match(/^([a-zA-Z]+)(\d+)([a-zA-Z]?)$/);
                    if (objektMatch) {
                        const season = objektMatch[1].toLowerCase(); 
                        const number = objektMatch[2];               
                        let type = objektMatch[3].toLowerCase();     
                        
                        if (type === 'z') {
                            type = '';
                        }
                        
                        return season + number + type;
                    }
                    
                    return token;
                });
                
                return processedTokens.join(' ');
            });

            document.getElementById("output").value = outputLines.join('\n');
        }
    </script>

</body>
</html>
